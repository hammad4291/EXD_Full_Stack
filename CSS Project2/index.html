<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="main-nav">
      <img
        src="https://full-stack-javascript-course.vercel.app/full-stack/images/coffee_masters_logo.png"
        alt="Coffee Masters Logo"
      />
      <h1>Coffee Masters</h1>
    </nav>
    <div class="main-div">
      <div class="items box">
        <h2>ITEMS</h2>
        <ul class="list-items">
          <li class="list-item">
            <div class="item-quantity">1X</div>
            <div class="item-title">Cappucino</div>
            <div class="item-price">$6.00</div>
            <ul class="item-options-list">
              <li class="item-option">Light Foam</li>
            </ul>
          </li>
          <li class="list-item">
            <div class="item-quantity">1X</div>
            <div class="item-title">Cappucino</div>
            <div class="item-price">$7.90</div>
            <ul class="item-options-list">
              <li class="item-option">Almond Milk</li>
              <li class="item-option">Double Espresso Shot</li>
            </ul>
          </li>
          <li class="list-item">
            <div class="item-quantity">1X</div>
            <div class="item-title">Croissant</div>
            <div class="item-price">$5.37</div>
            <ul class="item-options-list">
              <li class="item-option">Butter</li>
            </ul>
          </li>
        </ul>
      </div>
      <div class="name box">
        <h2>NAME</h2>
        <div class="example-group">
          <label for="example" class="input-label">Example Text</label>
          <input
            id="example"
            class="example-input"
          />
        </div>
      </div>
      <div class="payment box">
        <h2>PAYMENT</h2>
      </div>
    </div>
  </body>
</html>
